    + '<p style="font-family:&#39;Source Serif Pro&#39;,Georgia,serif;font-size:30px;font-weight:600;color:'+color+';line-height:1.1;margin:0 0 8px;">'+v+'</p>'
    + '<p style="font-family:&#39;Source Serif Pro&#39;,Georgia,serif;font-style:italic;font-size:14px;color:#6B6B6B;line-height:1.5;margin:0 0 26px;">'+sentence+'</p>'
    + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr>'
      + '<td width="'+score+'%" valign="middle"><table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr>'

      + '</tr></table></td>'

// regret meter: 4 email-safe segments, filled left-to-right by urgency (matches the quiz page)
function regretMeter(level){
  var idx=REGIDX[level], color=REG[level], cells='';
  for(var i=0;i<4;i++){
    var bg=(i<=idx)?color:'#D8D5CE';
    var pad=(i===0)?'padding:0 2px 0 0;':(i===3)?'padding:0 0 0 2px;':'padding:0 2px;';
    cells+='<td width="25%" valign="middle" style="'+pad+'"><div style="height:8px;background:'+bg+';font-size:0;line-height:0;">&#160;</div></td>';
  }
  return '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 16px;"><tr>'+cells+'</tr></table>';
}

    + '<p style="font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:bold;color:#0F0F0F;margin:20px 0 12px;">'+p.dl+'</p>'
    + '<a href="#" style="display:inline-block;background:#FFFFFF;color:#0F0F0F;border:1px solid #D8D5CE;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:600;text-decoration:none;padding:11px 18px;margin:0 6px 8px 0;">PDF</a>'
    + '<a href="#" style="display:inline-block;background:#FFFFFF;color:#0F0F0F;border:1px solid #D8D5CE;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:600;text-decoration:none;padding:11px 18px;margin:0 6px 8px 0;">EPUB (Kindle)</a>'
    + '<a href="#" style="display:inline-block;background:#FFFFFF;color:#0F0F0F;border:1px solid #D8D5CE;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:600;text-decoration:none;padding:11px 18px;margin:0 0 8px 0;">Audio (MP3)</a>'
  + '</td></tr></table>'
  + shareBlock(p)
  + rule()
  + sectionTitle('Get the Book')
  + '<p style="font-family:&#39;Source Serif Pro&#39;,Georgia,serif;font-size:17px;color:#3A3A3A;line-height:1.55;text-align:center;margin:0 0 18px;"><em>Choose Your Work</em> takes you from this snapshot to the system behind it. Your result points to where to begin, but the book is where the change happens.</p>'
  + '<a href="https://dandobos.com/choose-your-work/" style="display:block;background:#0F0F0F;color:#FFFFFF;font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:bold;text-decoration:none;text-align:center;padding:15px;border-radius:8px;">Get Choose Your Work</a>'
  + '</td></tr><tr><td style="padding:8px 36px 30px;"><p style="font-family:Inter,Arial,sans-serif;font-size:11px;color:#9A9A9A;text-align:center;line-height:1.5;margin:0;">You are receiving this because you took The Hidden Work assessment.</p></td></tr></table>'
  + '</td></tr></table>';
}
function show(i){
  document.getElementById('stage').innerHTML = emailCard(P[i]);
  var tabs=document.querySelectorAll('.pv-tab');
  for(var k=0;k<tabs.length;k++){ tabs[k].className='pv-tab'+(k===i?' active':''); }
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('tabs').innerHTML = P.map(function(p,i){ return '<button class="pv-tab" onclick="show('+i+')">'+p.arch.replace('The ','')+'</button>'; }).join('');
show(0);
</script>
